# autopilot.conf — Project configuration for Autopilot
# Source: https://github.com/diziet/autopilot
#
# Place this file in your project root. All values have sensible defaults —
# you only need to set what you want to change. Lines starting with # are
# comments. Only lines matching AUTOPILOT_[A-Z_]+= are parsed.
#
# Precedence: environment variable > .autopilot/config.conf > autopilot.conf > built-in default

# ──────────────────────────────────────────────────────────────────────────────
# Claude Code Settings
# ──────────────────────────────────────────────────────────────────────────────

# Claude CLI binary name or path.
# NOTE: macOS launchd agents don't inherit your shell PATH from ~/.zshrc.
# If claude is installed outside standard directories (e.g., ~/.local/bin/),
# set this to the absolute path so launchd can find it:
#   AUTOPILOT_CLAUDE_CMD="/Users/you/.local/bin/claude"
# Alternatively, re-run autopilot-schedule which auto-detects the location.
# Default: "claude"
#AUTOPILOT_CLAUDE_CMD="claude"

# Extra flags passed to every Claude invocation.
# IMPORTANT: For unattended/cron use, you MUST set:
#   AUTOPILOT_CLAUDE_FLAGS="--dangerously-skip-permissions"
# Without this flag, Claude will hang waiting for permission approval.
# Default: "" (empty — interactive mode, will prompt for permissions)
#AUTOPILOT_CLAUDE_FLAGS=""

# Claude model to use for all agent invocations.
# Passed as --model flag to Claude CLI.
# Default: "opus"
#AUTOPILOT_CLAUDE_MODEL="opus"

# Claude output format. Used by all agent invocations.
# Default: "json"
#AUTOPILOT_CLAUDE_OUTPUT_FORMAT="json"

# CLAUDE_CONFIG_DIR for the coder/fixer/test-fixer agents.
# Set this for multi-account setups to separate billing and avoid rate-limit
# contention between coder and reviewer (they often run concurrently).
# The account number N maps to ~/.claude-account{N}/ by convention.
# Default: "" (uses system default)
#AUTOPILOT_CODER_CONFIG_DIR=""
#
# Example with account 1:
#AUTOPILOT_CODER_CONFIG_DIR="/Users/you/.claude-account1"

# CLAUDE_CONFIG_DIR for the reviewer and merger agents.
# When empty, uses the system default (not the coder config).
# Default: "" (uses system default)
#AUTOPILOT_REVIEWER_CONFIG_DIR=""
#
# Example with account 2 (recommended: different from coder):
#AUTOPILOT_REVIEWER_CONFIG_DIR="/Users/you/.claude-account2"
#
# When using launchd, you can also set accounts via autopilot-schedule:
#   autopilot-schedule --dispatcher-account 1 --reviewer-account 2 /path/to/project
# This injects CLAUDE_CONFIG_DIR into each plist's environment automatically.

# CLAUDE_CONFIG_DIR for the spec review agent.
# Falls back to AUTOPILOT_CODER_CONFIG_DIR when empty.
# Default: "" (falls back to coder config, then system default)
#AUTOPILOT_SPEC_REVIEW_CONFIG_DIR=""

# ──────────────────────────────────────────────────────────────────────────────
# Task Source
# ──────────────────────────────────────────────────────────────────────────────

# Path to the tasks file. Auto-detected if empty:
# looks for tasks.md, then *implementation*guide*.md in the project root.
# Default: "" (auto-detect)
#AUTOPILOT_TASKS_FILE=""

# Colon-separated paths to reference documents included in coder context.
# Example: "docs/spec.md:docs/api-reference.md"
# Default: "" (none)
#AUTOPILOT_CONTEXT_FILES=""

# ──────────────────────────────────────────────────────────────────────────────
# Timeouts (seconds)
# ──────────────────────────────────────────────────────────────────────────────

# Maximum time for the coder agent to implement a task.
# Default: 2700 (45 minutes)
#AUTOPILOT_TIMEOUT_CODER=2700

# Maximum time for the fixer agent to address review feedback.
# Default: 900 (15 minutes)
#AUTOPILOT_TIMEOUT_FIXER=900

# Maximum time for the test gate to run project tests.
# Default: 300 (5 minutes)
#AUTOPILOT_TIMEOUT_TEST_GATE=300

# Outer timeout for the full review cycle (all reviewers).
# Default: 600 (10 minutes)
#AUTOPILOT_TIMEOUT_REVIEWER=600

# Per-reviewer Claude call timeout. Must be less than TIMEOUT_REVIEWER.
# Default: 450 (7.5 minutes)
#AUTOPILOT_TIMEOUT_REVIEWER_CLAUDE=450

# Maximum time for the merger agent (final review + merge).
# Default: 600 (10 minutes)
#AUTOPILOT_TIMEOUT_MERGER=600

# Maximum time for task summary generation (runs in background).
# Default: 60 (1 minute)
#AUTOPILOT_TIMEOUT_SUMMARY=60

# Maximum time for failure diagnosis agent.
# Default: 300 (5 minutes)
#AUTOPILOT_TIMEOUT_DIAGNOSE=300

# Maximum time for spec compliance review.
# Default: 1200 (20 minutes)
#AUTOPILOT_TIMEOUT_SPEC_REVIEW=1200

# Maximum time for the test fixer agent.
# Default: 600 (10 minutes)
#AUTOPILOT_TIMEOUT_FIX_TESTS=600

# Timeout for GitHub API calls via gh CLI.
# Default: 30
#AUTOPILOT_TIMEOUT_GH=30

# ──────────────────────────────────────────────────────────────────────────────
# Limits
# ──────────────────────────────────────────────────────────────────────────────

# Maximum retries per task (full coder respawn) before running diagnosis.
# Default: 5
#AUTOPILOT_MAX_RETRIES=5

# Maximum consecutive network error retries before pausing pipeline.
# Network errors (DNS, connection refused, HTTP 5xx, Claude API 529/500)
# do not count against the per-task retry budget. After this limit, a
# PAUSE file is created. With 5-minute cooldown intervals after the first
# 2 retries, 100 retries covers ~8 hours of outage patience.
# Default: 100
#AUTOPILOT_MAX_NETWORK_RETRIES=100

# Cooldown period (seconds) between network retries after the first 2
# immediate retries. Prevents hammering a down API every 15 seconds.
# Default: 300
#AUTOPILOT_NETWORK_COOLDOWN_SECONDS=300

# Maximum test fixer attempts before escalating to diagnosis.
# Default: 3
#AUTOPILOT_MAX_TEST_FIX_RETRIES=3

# Auto-clean lock files older than this many minutes (stale process detection).
# Default: 45
#AUTOPILOT_STALE_LOCK_MINUTES=45

# Rotate pipeline.log after this many lines.
# Default: 50000
#AUTOPILOT_MAX_LOG_LINES=50000

# Maximum diff size (bytes) sent to reviewers. Larger diffs are skipped.
# Default: 500000 (500 KB)
#AUTOPILOT_MAX_DIFF_BYTES=500000

# Maximum lines of completed-task summary fed to coder context.
# Default: 50
#AUTOPILOT_MAX_SUMMARY_LINES=50

# Maximum lines per individual summary entry.
# Default: 20
#AUTOPILOT_MAX_SUMMARY_ENTRY_LINES=20

# ──────────────────────────────────────────────────────────────────────────────
# Testing
# ──────────────────────────────────────────────────────────────────────────────

# Custom test command. When set, bypasses auto-detection entirely.
# Auto-detect order: pytest, npm test, bats, make test.
# Default: "" (auto-detect)
#AUTOPILOT_TEST_CMD=""

# Number of parallel test jobs. Passed to test runner (e.g. bats --jobs N).
# Default: 20
#AUTOPILOT_TEST_JOBS=20

# Timeout for test execution (seconds).
# Default: 300 (5 minutes)
#AUTOPILOT_TEST_TIMEOUT=300

# Lines of test output included in PR comments on failure.
# Default: 80
#AUTOPILOT_TEST_OUTPUT_TAIL=80

# ──────────────────────────────────────────────────────────────────────────────
# Review
# ──────────────────────────────────────────────────────────────────────────────

# Comma-separated list of reviewer personas to run on each PR.
# Built-in personas: general, dry, performance, security, design.
# Custom personas: add a .md file to the reviewers/ directory and list it here.
# Default: "general,dry,performance,security,design"
#AUTOPILOT_REVIEWERS="general,dry,performance,security,design"

# Run spec compliance review every Nth merged task. Set to 0 to disable.
# Default: 5
#AUTOPILOT_SPEC_REVIEW_INTERVAL=5

# ──────────────────────────────────────────────────────────────────────────────
# Branches
# ──────────────────────────────────────────────────────────────────────────────

# Branch name prefix. Branches are created as: <prefix>/task-N.
# Default: "autopilot"
#AUTOPILOT_BRANCH_PREFIX="autopilot"

# Target branch for PRs (base branch to merge into).
# Default: "main"
#AUTOPILOT_TARGET_BRANCH="main"

# ──────────────────────────────────────────────────────────────────────────────
# Auth & Fallback
# ──────────────────────────────────────────────────────────────────────────────

# Maximum consecutive reviewer failures before pausing the pipeline.
# After this many failures, a PAUSE file is created. Reset by removing
# the PAUSE file and resetting reviewer_retry_count in state.json.
# Default: 5
#AUTOPILOT_MAX_REVIEWER_RETRIES=5

# Enable account fallback when primary Claude account auth fails.
# When true, if account 1 fails auth, tries account 2 (and vice versa).
# When false, auth failure immediately fails the spawn.
# Set to false if accounts have different rate limits and you don't want cross-use.
# Default: "true"
#AUTOPILOT_AUTH_FALLBACK="true"

# Timeout (seconds) for the auth probe command.
# Default: 10
#AUTOPILOT_TIMEOUT_AUTH_CHECK=10

# ──────────────────────────────────────────────────────────────────────────────
# Worktrees
# ──────────────────────────────────────────────────────────────────────────────

# Use git worktrees for task branches instead of direct checkout.
# When true, each task gets its own worktree at .autopilot/worktrees/task-N/.
# The user's working tree is never touched, allowing concurrent work.
# Set to false for projects with relative symlinks or other worktree-incompatible setups.
# Default: "true"
#AUTOPILOT_USE_WORKTREES="true"

# Custom command to run in the worktree after dependency auto-detection.
# Runs after npm/pip/bundle/go install. Use for project-specific setup.
# Default: "" (none)
#AUTOPILOT_WORKTREE_SETUP_CMD=""

# When true, dependency install failures are non-fatal (soft-fail).
# When false (default), install failures abort the task and trigger retry.
# Default: "false"
#AUTOPILOT_WORKTREE_SETUP_OPTIONAL="false"
