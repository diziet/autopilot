# live-test-autopilot.conf — Config for the sacrificial live test project.
# Tuned for trivial Python tasks that Haiku can complete quickly.

# Use Haiku for fast, cheap test runs.
AUTOPILOT_CLAUDE_MODEL=claude-haiku-4-5-20251001

# Short timeouts — these tasks are trivial.
AUTOPILOT_TIMEOUT_CODER=300
AUTOPILOT_TIMEOUT_FIXER=180
AUTOPILOT_TIMEOUT_REVIEWER=180
AUTOPILOT_TIMEOUT_MERGER=180

# Run all five reviewer personas for full coverage.
AUTOPILOT_REVIEWERS=general,dry,performance,security,design

# Explicit test command — no auto-detection needed.
AUTOPILOT_TEST_CMD=pytest

# Branch prefix (overridden at runtime to live-YYYYMMDD-HHMMSS in --github mode).
AUTOPILOT_BRANCH_PREFIX=autopilot

# Merge target.
AUTOPILOT_TARGET_BRANCH=main
